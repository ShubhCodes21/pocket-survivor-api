# ═══════════════════════════════════════════════════════════════════
# Pocket Survivor - Local Development Stack
# Usage: docker-compose up -d
# ═══════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ps-postgres
    environment:
      POSTGRES_DB: pocketsurvivor
      POSTGRES_USER: pocketsurvivor
      POSTGRES_PASSWORD: pocketsurvivor
    ports:
      - "5432:5432"
    volumes:
      - ps_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pocketsurvivor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ps-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/pocketsurvivor
      DB_USERNAME: pocketsurvivor
      DB_PASSWORD: pocketsurvivor
      JWT_SECRET: change-this-to-a-real-256-bit-secret-key-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:4173
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── React Frontend (Vite) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ps-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  ps_pgdata:
