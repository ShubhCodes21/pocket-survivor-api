# ──────────────────────────────────────────────
# Pocket Survivor - Application Configuration
# ──────────────────────────────────────────────

spring.application.name=pocket-survivor

# ── Server ───────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL ───────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pocketsurvivor}
spring.datasource.username=${DB_USERNAME:pocketsurvivor}
spring.datasource.password=${DB_PASSWORD:pocketsurvivor}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway Migrations ────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false

# ── JWT Security ─────────────────────────────
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please}
app.jwt.expiration-ms=604800000

# ── Anthropic API (Coach) ────────────────────
app.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.anthropic.model=claude-sonnet-4-20250514

# ── CORS ─────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Gmail SMTP ───────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:noreply@pocketsurvivor.com}

# ── Logging ──────────────────────────────────
logging.level.com.pocketsurvivor=DEBUG
logging.level.org.springframework.security=WARN
